function waitForPizza() {
  return new Promise(resolve => {
   setTimeout(() => {
        resolve("pizza is ready")
   }, 3000);
  });
}

async function orderPizza() {
  console.log("⏳ Waiting for pizza...");
  const pizza = await waitForPizza(); // waits here until promise resolves
  console.log(pizza); // 🍕 Pizza is ready!
}

orderPizza();
